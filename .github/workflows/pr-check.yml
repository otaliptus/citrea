name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, edited]
  issue_comment:
    types: [created, edited]

jobs:
  validate:
    name: Validate PR Title
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check PR Title
        uses: amannn/action-semantic-pull-request@v5
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
            release

          scopes: |
          requireScope: false
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}"
            didn't match the configured pattern. Please ensure that:
            - The subject starts with a lowercase letter
            - The subject doesn't end with a period

            Example of a valid PR title:
            feat: add new mempool maintenance feature
            fix(sequencer): resolve memory leak in transaction processing

          validateSingleCommit: false
          validateSingleCommitMatchesPrTitle: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  check-changelog:
    needs: validate
    permissions:
      contents: read
      pull-requests: write
      issues: write
    name: Check Changelog Entry
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request)
    steps:
      - name: Handle dismissal comment
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            const prAuthor = context.payload.issue.user.login;
            const commenter = context.payload.comment.user.login;

            if (commenter !== prAuthor && !['OWNER', 'MEMBER', 'COLLABORATOR'].includes(context.payload.comment.author_association)) {
              return; // Exit if unauthorized
            }

            const commentBody = context.payload.comment.body.toLowerCase();
            const isDismissal = commentBody.includes('skip-changelog') ||
                               commentBody.includes('no changelog') ||
                               commentBody.includes('/skip-changelog');

            if (isDismissal) {
              // Find and delete the bot's warning comment
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
              });

              const botComment = comments.find(comment =>
                comment.user.type === 'Bot' &&
                comment.body.includes('Changelog entry missing')
              );

              if (botComment) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: botComment.id
                });

                // React to the user's comment
                await github.rest.reactions.createForIssueComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: context.payload.comment.id,
                  content: '+1'
                });
              }
            }

      - name: Checkout code
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if CHANGELOG.md was modified
        if: github.event_name == 'pull_request'
        id: changelog-check
        run: |
          git fetch origin ${{ github.base_ref }}
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q "^CHANGELOG.md$"; then
            echo "modified=true" >> $GITHUB_OUTPUT
          else
            echo "modified=false" >> $GITHUB_OUTPUT
          fi

      - name: Comment if changelog is missing
        if: |
          github.event_name == 'pull_request' &&
          steps.changelog-check.outputs.modified == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const prTitle = context.payload.pull_request.title;

            // Check if bot already commented
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Changelog entry missing')
            );

            // Only comment if we haven't already
            if (!botComment) {
              const commentBody = `## ⚠️ Changelog entry missing

            No changes detected in \`CHANGELOG.md\`.

            **Recommendation:**
            \`\`\`
            ${prTitle}
            \`\`\`

            Please add an entry to the CHANGELOG.md or dismiss this if the change doesn't require documentation.

            **To dismiss:** Reply with \`/skip-changelog\` in any comment.`;

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: commentBody
              });
            }

      - name: Remove comment if changelog was added
        if: |
          github.event_name == 'pull_request' &&
          steps.changelog-check.outputs.modified == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Changelog entry missing')
            );

            if (botComment) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id
              });
            }